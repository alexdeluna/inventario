<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InvGov PWA</title>

<link rel="stylesheet" href="visual.css">
<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

</head>

<body>
    <div class="header">INVENTÁRIO GOVERNAMENTAL</div>
    
    <div class="container">
        <div class="card">
            <form id="form-inventario">
                <label>Setor</label>
                <input type="text" id="setor" required placeholder="Ex: Recepção">
                
                <label>Tipo de Equipamento</label>
                <select id="tipo" required>
                    <option value="">Selecione...</option>
                    <option value="Desktop">Desktop</option>
                    <option value="Monitor">Monitor</option>
                    <option value="Notebook">Notebook</option>
                    <option value="Impressora">Impressora</option>
                    <option value="Outros">Outros</option>
                </select>

                <label>Número de Série</label>
                <input type="text" id="serie" required placeholder="S/N do Fabricante">

                <label>Número de Tombamento</label>
                <input type="text" id="tombamento" required placeholder="Patrimônio">

                <label>Observações</label>
                <textarea id="obs" rows="2"></textarea>

                <button type="submit" id="btn-salvar" class="btn btn-save">SALVAR REGISTRO</button>
            </form>
            <div id="status" class="sync-status">Aguardando conexão com o servidor...</div>
        </div>

        <div class="card">
            <h3>Exportar Base de Dados</h3>
            <div class="btn-group">
                <button onclick="exportar('excel')" class="btn btn-excel">EXCEL (.xlsx)</button>
                <button onclick="exportar('pdf')" class="btn btn-pdf">PDF (.pdf)</button>
            </div>
        </div>
    </div>

    <!-- O SEU CÓDIGO JS COM 'DEFER' PARA GARANTIR A ORDEM -->
    <script src="app.js" defer></script>
</body>
</html>
